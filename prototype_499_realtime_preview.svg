<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- 实时预览功能原型 -->
  <rect x="0" y="0" width="800" height="500" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  
  <text x="400" y="30" font-family="Arial" font-size="14" fill="#495057" text-anchor="middle" font-weight="bold">实时格式化预览功能设计</text>
  
  <!-- 输入区 -->
  <rect x="50" y="60" width="300" height="150" fill="#ffffff" stroke="#4dabf7" stroke-width="2" rx="5"/>
  <text x="200" y="85" font-family="Arial" font-size="14" fill="#1864ab" text-anchor="middle">输入JSON</text>
  
  <rect x="70" y="100" width="260" height="100" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1" rx="3"/>
  <text x="80" y="120" font-family="Arial" font-size="10" fill="#868e96">{"name":"John","age":30,</text>
  <text x="80" y="135" font-family="Arial" font-size="10" fill="#868e96">"city":"New York"}</text>
  
  <!-- 输入状态 -->
  <text x="200" y="225" font-family="Arial" font-size="10" fill="#495057" text-anchor="middle">正在输入... 实时同步到右侧预览区</text>
  
  <!-- 箭头 -->
  <line x1="350" y1="130" x2="450" y2="130" stroke="#495057" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="440" y1="125" x2="450" y2="130" stroke="#495057" stroke-width="1"/>
  <line x1="440" y1="135" x2="450" y2="130" stroke="#495057" stroke-width="1"/>
  
  <!-- 预览区 -->
  <rect x="450" y="60" width="300" height="150" fill="#ffffff" stroke="#40c057" stroke-width="2" rx="5"/>
  <text x="600" y="85" font-family="Arial" font-size="14" fill="#2b8a3e" text-anchor="middle">实时预览</text>
  
  <rect x="470" y="100" width="260" height="100" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1" rx="3"/>
  <text x="480" y="120" font-family="Arial" font-size="10" fill="#1864ab" font-weight="bold">{</text>
  <text x="495" y="120" font-family="Arial" font-size="10" fill="#1864ab">"name"</text>
  <text x="545" y="120" font-family="Arial" font-size="10" fill="#868e96">:</text>
  <text x="560" y="120" font-family="Arial" font-size="10" fill="#2b8a3e">"John"</text>
  <text x="480" y="140" font-family="Arial" font-size="10" fill="#1864ab">"age"</text>
  <text x="530" y="140" font-family="Arial" font-size="10" fill="#868e96">:</text>
  <text x="545" y="140" font-family="Arial" font-size="10" fill="#e67700">30</text>
  <text x="480" y="160" font-family="Arial" font-size="10" fill="#1864ab">"city"</text>
  <text x="530" y="160" font-family="Arial" font-size="10" fill="#868e96">:</text>
  <text x="545" y="160" font-family="Arial" font-size="10" fill="#2b8a3e">"New York"</text>
  <text x="480" y="180" font-family="Arial" font-size="10" fill="#1864ab" font-weight="bold">}</text>
  
  <!-- 预览状态 -->
  <rect x="550" y="220" width="200" height="25" fill="#d3f9d8" stroke="#40c057" stroke-width="1" rx="3"/>
  <text x="650" y="236" font-family="Arial" font-size="10" fill="#2b8a3e" text-anchor="middle">✅ 预览已同步</text>
  
  <!-- 延迟指标 -->
  <rect x="50" y="240" width="300" height="80" fill="#ffffff" stroke="#4dabf7" stroke-width="2" rx="5"/>
  <text x="200" y="265" font-family="Arial" font-size="14" fill="#1864ab" text-anchor="middle">性能指标</text>
  
  <text x="70" y="290" font-family="Arial" font-size="10" fill="#495057">• 实时预览延迟：<tspan fill="#40c057">280ms</tspan> (≤300ms)</text>
  <text x="70" y="305" font-family="Arial" font-size="10" fill="#495057">• 渲染帧率：<tspan fill="#40c057">60fps</tspan></text>
  <text x="70" y="320" font-family="Arial" font-size="10" fill="495057">• 内存占用：<tspan fill="#40c057">低</tspan></text>
  
  <!-- 错误处理 -->
  <rect x="450" y="240" width="300" height="80" fill="#ffffff" stroke="#ff8787" stroke-width="2" rx="5"/>
  <text x="600" y="265" font-family="Arial" font-size="14" fill="#fa5252" text-anchor="middle">错误处理演示</text>
  
  <!-- 错误输入 -->
  <rect x="470" y="290" width="260" height="60" fill="#ffebee" stroke="#ff8787" stroke-width="1" rx="3"/>
  <text x="480" y="310" font-family="Arial" font-size="10" fill="#fa5252">❌ JSON格式错误：第3行缺少逗号</text>
  
  <!-- 开关控制 -->
  <rect x="50" y="340" width="700" height="60" fill="#f8f9fa" stroke="#4dabf7" stroke-width="1" rx="5"/>
  <text x="400" y="360" font-family="Arial" font-size="14" fill="#495057" text-anchor="middle">实时预览开关</text>
  
  <!-- 开关状态 -->
  <rect x="300" y="370" width="80" height="30" fill="#40c057" rx="15"/>
  <text x="340" y="390" font-family="Arial" font-size="12" fill="#ffffff" text-anchor="middle">ON</text>
  
  <rect x="420" y="370" width="80" height="30" fill="#e9ecef" stroke="#adb5bd" stroke-width="1" rx="15"/>
  <text x="460" y="390" font-family="Arial" font-size="12" fill="#868e96" text-anchor="middle">OFF</text>
  
  <!-- 按钮状态变化 -->
  <rect x="50" y="420" width="700" height="60" fill="#fff3bf" stroke="#f08c00" stroke-width="1" rx="5"/>
  <text x="400" y="440" font-family="Arial" font-size="14" fill="#e67700" text-anchor="middle">实时预览时按钮变化</text>
  
  <rect x="200" y="450" width="120" height="30" fill="#339af0" rx="5"/>
  <text x="260" y="470" font-family="Arial" font-size="12" fill="#ffffff" text-anchor="middle">应用</text>
  <text x="260" y="485" font-family="Arial" font-size="8" fill="#ffffff" text-anchor="middle">确认最终结果</text>
  
  <rect x="340" y="450" width="120" height="30" fill="#e9ecef" rx="5"/>
  <text x="400" y="470" font-family="Arial" font-size="12" fill="#868e96" text-anchor="middle">格式化</text>
  <text x="400" y="485" font-family="Arial" font-size="8" fill="#868e96" text-anchor="middle">非实时模式</text>
</svg>