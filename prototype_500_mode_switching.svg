<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- 多模式切换原型 -->
  <rect x="0" y="0" width="800" height="500" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  
  <text x="400" y="30" font-family="Arial" font-size="14" fill="#495057" text-anchor="middle" font-weight="bold">多模式切换用户体验优化设计</text>
  
  <!-- 模式切换标签页 -->
  <rect x="100" y="60" width="600" height="50" fill="#ffffff" stroke="#4dabf7" stroke-width="1" rx="5"/>
  
  <!-- 当前选中模式 -->
  <rect x="100" y="60" width="200" height="50" fill="#4dabf7" rx="5"/>
  <text x="200" y="90" font-family="Arial" font-size="14" fill="#ffffff" text-anchor="middle">JSON模式</text>
  <text x="200" y="105" font-family="Arial" font-size="8" fill="#ffffff" text-anchor="middle">快捷键: Ctrl+1</text>
  
  <!-- 其他模式 -->
  <rect x="300" y="60" width="200" height="50" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1" rx="5"/>
  <text x="400" y="90" font-family="Arial" font-size="14" fill="#495057" text-anchor="middle">Markdown模式</text>
  <text x="400" y="105" font-family="Arial" font-size="8" fill="#868e96" text-anchor="middle">快捷键: Ctrl+2</text>
  
  <!-- 预留模式 -->
  <rect x="500" y="60" width="200" height="50" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1" rx="5"/>
  <text x="600" y="90" font-family="Arial" font-size="14" fill="#495057" text-anchor="middle">更多模式</text>
  <text x="600" y="105" font-family="Arial" font-size="8" fill="#868e96" text-anchor="middle">开发中...</text>
  
  <!-- 加载状态演示 -->
  <rect x="100" y="130" width="600" height="100" fill="#ffffff" stroke="#4dabf7" stroke-width="2" rx="5"/>
  <text x="400" y="155" font-family="Arial" font-size="14" fill="#1864ab" text-anchor="middle">模式切换加载状态</text>
  
  <!-- 点击切换 -->
  <rect x="450" y="170" width="100" height="30" fill="#e9ecef" stroke="#adb5bd" stroke-width="1" rx="5"/>
  <text x="500" y="190" font-family="Arial" font-size="12" fill="#495057" text-anchor="middle">点击切换</text>
  
  <!-- 箭头 -->
  <line x1="500" y1="200" x2="500" y2="220" stroke="#495057" stroke-width="1"/>
  <line x1="490" y1="215" x2="500" y2="220" stroke="#495057" stroke-width="1"/>
  <line x1="510" y1="215" x2="500" y2="220" stroke="#495057" stroke-width="1"/>
  
  <!-- 加载状态 -->
  <rect x="250" y="220" width="300" height="60" fill="#fff3bf" stroke="#f08c00" stroke-width="1" rx="5"/>
  <text x="400" y="240" font-family="Arial" font-size="12" fill="#e67700" text-anchor="middle">⏳ 正在切换到Markdown模式...</text>
  <text x="400" y="255" font-family="Arial" font-size="10" fill="#e67700" text-anchor="middle">加载中，请稍候</text>
  
  <!-- 独立状态保持 -->
  <rect x="100" y="250" width="600" height="100" fill="#ffffff" stroke="#40c057" stroke-width="2" rx="5"/>
  <text x="400" y="275" font-family="Arial" font-size="14" fill="#2b8a3e" text-anchor="middle">独立状态保持机制</text>
  
  <!-- JSON状态 -->
  <rect x="120" y="300" width="180" height="40" fill="#e7f5ff" stroke="#4dabf7" stroke-width="1" rx="3"/>
  <text x="210" y="325" font-family="Arial" font-size="10" fill="#1864ab" text-anchor="middle">JSON状态</text>
  <text x="210" y="337" font-family="Arial" font-size="8" fill="#1864ab" text-anchor="middle">缩进: 2空格</text>
  
  <!-- Markdown状态 -->
  <rect x="320" y="300" width="180" height="40" fill="#d3f9d8" stroke="#40c057" stroke-width="1" rx="3"/>
  <text x="410" y="325" font-family="Arial" font-size="10" fill="#2b8a3e" text-anchor="middle">Markdown状态</text>
  <text x="410" y="337" font-family="Arial" font-size="8" fill="#2b8a3e" text-anchor="middle">主题: 深色</text>
  
  <!-- 独立输入内容 -->
  <rect x="520" y="300" width="160" height="40" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1" rx="3"/>
  <text x="600" y="325" font-family="Arial" font-size="10" fill="#495057" text-anchor="middle">独立内容存储</text>
  
  <!-- 历史导航 -->
  <rect x="100" y="370" width="600" height="60" fill="#ffffff" stroke="#7950f2" stroke-width="2" rx="5"/>
  <text x="400" y="395" font-family="Arial" font-size="14" fill="#5f3dc4" text-anchor="middle">模式切换历史导航</text>
  
  <!-- 后退按钮 -->
  <rect x="200" y="390" width="80" height="30" fill="#f8f9fa" stroke="#7950f2" stroke-width="1" rx="5"/>
  <text x="240" y="410" font-family="Arial" font-size="12" fill="#5f3dc4" text-anchor="middle">← 后退</text>
  
  <!-- 前进按钮 -->
  <rect x="300" y="390" width="80" height="30" fill="#f8f9fa" stroke="#7950f2" stroke-width="1" rx="5"/>
  <text x="340" y="410" font-family="Arial" font-size="12" fill="#5f3dc4" text-anchor="middle">前进 →</text>
  
  <!-- 历史记录 -->
  <rect x="420" y="390" width="160" height="30" fill="#f3f0ff" stroke="#7950f2" stroke-width="1" rx="5"/>
  <text x="500" y="410" font-family="Arial" font-size="10" fill="#5f3dc4" text-anchor="middle">历史: JSON → Markdown</text>
  
  <!-- 快捷键提示 -->
  <rect x="100" y="450" width="600" height="40" fill="#fff3bf" stroke="#f08c00" stroke-width="1" rx="5"/>
  <text x="400" y="470" font-family="Arial" font-size="12" fill="#e67700" text-anchor="middle">🎮 快捷键: Ctrl+1 (JSON) / Ctrl+2 (Markdown) / Ctrl+Tab (模式切换)</text>
  
  <!-- 状态同步 -->
  <rect x="100" y="495" width="600" height="15" fill="#e7f5ff" stroke="#4dabf7" stroke-width="1" rx="2"/>
  <text x="110" y="507" font-family="Arial" font-size="10" fill="#1864ab">🔄 不同模式保持独立状态，切换时自动恢复</text>
</svg>