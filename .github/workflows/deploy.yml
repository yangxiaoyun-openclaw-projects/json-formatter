name: Deploy to Aliyun

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to Aliyun Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.ALIYUN_HOST }}
        username: ${{ secrets.ALIYUN_USERNAME }}
        password: ${{ secrets.ALIYUN_PASSWORD }}
        command_timeout: 30m
        script: |
          # 创建目录并克隆（首次）
          mkdir -p /home/yangxiaoyun/workspace/online
          if [ ! -d "/home/yangxiaoyun/workspace/online/json-formatter" ]; then
            cd /home/yangxiaoyun/workspace/online
            git clone https://github.com/yangxiaoyun-openclaw-projects/json-formatter.git
          fi
          
          cd /home/yangxiaoyun/workspace/online/json-formatter
          git pull origin master
          pip3 install -r requirements.txt
          
          # 停止旧进程
          pkill -f "python.*app.py" 2>/dev/null || true
          sleep 1
          
          # 使用 setsid 启动独立进程
          setsid python3 app.py > /tmp/json-formatter.log 2>&1 &
          sleep 2
          
          # 检查是否启动成功
          if pgrep -f "python.*app.py" > /dev/null; then
            echo "✅ Service started successfully on port 5000"
            curl -s http://localhost:5000 > /dev/null && echo "✅ Health check passed"
          else
            echo "❌ Service failed to start"
            cat /tmp/json-formatter.log
            exit 1
          fi
