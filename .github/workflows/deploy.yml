name: Deploy to Aliyun

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to Aliyun Server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.ALIYUN_HOST }}
        username: ${{ secrets.ALIYUN_USERNAME }}
        password: ${{ secrets.ALIYUN_PASSWORD }}
        timeout: 2m
        command_timeout: 10m
        request_pty: true
        script: |
          echo "=== Starting deployment ==="
          
          # 创建目录并克隆（首次）
          mkdir -p /home/yangxiaoyun/workspace/online
          if [ ! -d "/home/yangxiaoyun/workspace/online/json-formatter" ]; then
            cd /home/yangxiaoyun/workspace/online
            git clone https://github.com/yangxiaoyun-openclaw-projects/json-formatter.git
          fi
          
          cd /home/yangxiaoyun/workspace/online/json-formatter
          
          # 重试 git pull（最多3次）
          for i in 1 2 3; do
            if git pull origin master; then
              echo "✅ Git pull successful on attempt $i"
              break
            else
              echo "⚠️ Git pull failed on attempt $i, retrying..."
              sleep 5
            fi
          done
          
          echo "=== Installing dependencies ==="
          pip3 install -r requirements.txt
          
          echo "=== Stopping old process ==="
          pkill -f "python3 app.py" 2>/dev/null || true
          sleep 2
          
          echo "=== Starting new process ==="
          cd /home/yangxiaoyun/workspace/online/json-formatter
          nohup python3 app.py > /tmp/json-formatter.log 2>&1 &
          PID=$!
          echo $PID > /tmp/json-formatter.pid
          echo "Started with PID: $PID"
          sleep 3
          
          echo "=== Checking service ==="
          if kill -0 $PID 2>/dev/null; then
            echo "✅ Service started with PID $PID"
          else
            echo "❌ Failed to start service"
            cat /tmp/json-formatter.log
            exit 1
          fi
          
          echo "=== Deployment completed ==="
