name: Deploy to Aliyun

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to Aliyun Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.ALIYUN_HOST }}
        username: ${{ secrets.ALIYUN_USERNAME }}
        password: ${{ secrets.ALIYUN_PASSWORD }}
        command_timeout: 5m
        script: |
          # 创建目录并克隆（首次）
          mkdir -p /home/yangxiaoyun/workspace/online
          if [ ! -d "/home/yangxiaoyun/workspace/online/json-formatter" ]; then
            cd /home/yangxiaoyun/workspace/online
            git clone https://github.com/yangxiaoyun-openclaw-projects/json-formatter.git
          fi
          
          cd /home/yangxiaoyun/workspace/online/json-formatter
          git pull origin master
          pip3 install -r requirements.txt
          
          # 停止旧进程
          pkill -f "python3 app.py" 2>/dev/null || true
          sleep 1
          
          # 使用 nohup 启动后台服务
          cd /home/yangxiaoyun/workspace/online/json-formatter
          nohup python3 app.py > /tmp/json-formatter.log 2>&1 &
          echo $! > /tmp/json-formatter.pid
          sleep 2
          
          # 检查服务
          if kill -0 $(cat /tmp/json-formatter.pid) 2>/dev/null; then
            echo "✅ Service started with PID $(cat /tmp/json-formatter.pid)"
          else
            echo "❌ Failed to start service"
            cat /tmp/json-formatter.log
            exit 1
          fi
