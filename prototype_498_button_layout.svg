<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- 功能按钮布局原型 -->
  <rect x="0" y="0" width="800" height="500" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  
  <text x="400" y="30" font-family="Arial" font-size="14" fill="#495057" text-anchor="middle" font-weight="bold">功能按钮按使用频率分层布局</text>
  
  <!-- 一级：高频功能 -->
  <rect x="50" y="60" width="700" height="100" fill="#e7f5ff" stroke="#4dabf7" stroke-width="2" rx="5"/>
  <text x="400" y="85" font-family="Arial" font-size="14" fill="#1864ab" text-anchor="middle">一级：高频功能（主操作区）</text>
  
  <rect x="100" y="100" width="100" height="40" fill="#4dabf7" rx="5"/>
  <text x="150" y="125" font-family="Arial" font-size="12" fill="#ffffff" text-anchor="middle">格式化</text>
  <text x="150" y="145" font-family="Arial" font-size="8" fill="#ffffff" text-anchor="middle">使用率85%</text>
  
  <rect x="220" y="100" width="100" height="40" fill="#4dabf7" rx="5"/>
  <text x="270" y="125" font-family="Arial" font-size="12" fill="#ffffff" text-anchor="middle">压缩</text>
  <text x="270" y="145" font-family="Arial" font-size="8" fill="#ffffff" text-anchor="middle">使用率70%</text>
  
  <rect x="340" y="100" width="100" height="40" fill="#339af0" rx="5"/>
  <text x="390" y="125" font-family="Arial" font-size="12" fill="#ffffff" text-anchor="middle">复制</text>
  <text x="390" y="145" font-family="Arial" font-size="8" fill="#ffffff" text-anchor="middle">使用率60%</text>
  
  <!-- 二级：中频功能 -->
  <rect x="50" y="180" width="700" height="100" fill="#e7f5ff" stroke="#40c057" stroke-width="2" rx="5"/>
  <text x="400" y="205" font-family="Arial" font-size="14" fill="#2b8a3e" text-anchor="middle">二级：中频功能（下拉菜单）</text>
  
  <!-- 下拉菜单 -->
  <rect x="200" y="220" width="150" height="40" fill="#ffffff" stroke="#40c057" stroke-width="1" rx="5"/>
  <text x="275" y="245" font-family="Arial" font-size="12" fill="#2b8a3e" text-anchor="middle">转换 ▼</text>
  
  <rect x="370" y="220" width="150" height="40" fill="#ffffff" stroke="#40c057" stroke-width="1" rx="5"/>
  <text x="445" y="245" font-family="Arial" font-size="12" fill="#2b8a3e" text-anchor="middle">生成代码 ▼</text>
  
  <!-- 下拉内容 -->
  <rect x="200" y="265" width="150" height="80" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1" rx="3"/>
  <text x="275" y="285" font-family="Arial" font-size="10" fill="#495057" text-anchor="middle">CSV</text>
  <text x="275" y="300" font-family="Arial" font-size="10" fill="#495057" text-anchor="middle">YAML</text>
  <text x="275" y="315" font-family="Arial" font-size="10" fill="#495057" text-anchor="middle">TSV</text>
  <text x="275" y="330" font-family="Arial" font-size="10" fill="#495057" text-anchor="middle">XML</text>
  
  <rect x="370" y="265" width="150" height="80" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1" rx="3"/>
  <text x="445" y="285" font-family="Arial" font-size="10" fill="#495057" text-anchor="middle">TypeScript</text>
  <text x="445" y="300" font-family="Arial" font-size="10" fill="#495057" text-anchor="middle">Python</text>
  <text x="445" y="315" font-family="Arial" font-size="10" fill="#495057" text-anchor="middle">Java</text>
  <text x="445" y="330" font-family="Arial" font-size="10" fill="#495057" text-anchor="middle">Go</text>
  
  <!-- 三级：低频功能 -->
  <rect x="50" y="300" width="700" height="100" fill="#e7f5ff" stroke="#868e96" stroke-width="2" rx="5"/>
  <text x="400" y="325" font-family="Arial" font-size="14" fill="#495057" text-anchor="middle">三级：低频功能（设置菜单）</text>
  
  <!-- 设置按钮 -->
  <rect x="350" y="350" width="100" height="40" fill="#f8f9fa" stroke="#868e96" stroke-width="1" rx="5"/>
  <text x="400" y="375" font-family="Arial" font-size="12" fill="#495057" text-anchor="middle">设置 ⚙️</text>
  
  <!-- 设置菜单内容 -->
  <rect x="300" y="395" width="200" height="80" fill="#ffffff" stroke="#adb5bd" stroke-width="1" rx="3"/>
  <text x="400" y="415" font-family="Arial" font-size="10" fill="#495057" text-anchor="middle">Schema验证</text>
  <text x="400" y="430" font-family="Arial" font-size="10" fill="#495057" text-anchor="middle">批量处理</text>
  <text x="400" y="445" font-family="Arial" font-size="10" fill="#495057" text-anchor="middle">历史记录</text>
  <text x="400" y="460" font-family="Arial" font-size="10" fill="#495057" text-anchor="middle">API文档</text>
  
  <!-- 使用统计 -->
  <rect x="50" y="420" width="700" height="60" fill="#fff3bf" stroke="#f08c00" stroke-width="1" rx="5"/>
  <text x="400" y="440" font-family="Arial" font-size="12" fill="#e67700" text-anchor="middle">📊 功能使用统计：自动记录点击次数，调整排序</text>
  
  <!-- 固定按钮 -->
  <rect x="50" y="490" width="700" height="15" fill="#e7f5ff" stroke="#4dabf7" stroke-width="1" rx="2"/>
  <text x="60" y="502" font-family="Arial" font-size="10" fill="#1864ab">📌 支持手动固定常用功能位置</text>
</svg>