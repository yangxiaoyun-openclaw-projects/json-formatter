<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 格式化工具</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>JSON 格式化工具</h1>
        <div class="layout">
            <div class="input-section">
                <h2>输入 JSON</h2>
                <textarea id="json-input" placeholder="在此粘贴 JSON..."></textarea>
                <div class="action-buttons">
                    <button id="format-btn" class="format-btn">格式化</button>
                    <button id="compress-btn" class="compress-btn">压缩</button>
                </div>
            </div>
            <div class="output-section">
                <div class="output-header">
                    <h2>格式化结果</h2>
                    <button id="copy-btn" class="copy-btn" disabled>复制</button>
                </div>
                <pre id="json-output"></pre>
                <div id="copy-toast" class="copy-toast">已复制到剪贴板</div>
            </div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
