<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 格式化工具</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>JSON 格式化工具</h1>
        <div class="layout">
            <div class="input-section">
                <h2>输入 JSON</h2>
                <textarea id="json-input" placeholder="在此粘贴 JSON..."></textarea>
                <div class="controls">
                    <div class="action-buttons">
                        <button id="format-btn" class="format-btn">格式化</button>
                        <button id="compress-btn" class="compress-btn">压缩</button>
                    </div>
                    <div class="indent-selector">
                        <label>缩进：</label>
                        <select id="indent-select">
                            <option value="2">2 空格</option>
                            <option value="3">3 空格</option>
                            <option value="4">4 空格</option>
                        </select>
                    </div>
                </div>
                <div class="upload-section">
                    <div class="upload-options">
                        <button id="url-upload-btn" class="upload-btn">从URL加载</button>
                        <button id="file-upload-btn" class="upload-btn">上传文件</button>
                        <input type="file" id="file-input" accept=".json,application/json" style="display: none;">
                    </div>
                    <div id="url-input-container" class="url-input-container" style="display: none;">
                        <input type="text" id="url-input" placeholder="请输入JSON文件的URL..." class="url-input">
                        <button id="url-load-btn" class="url-load-btn">加载</button>
                    </div>
                    <div id="upload-error" class="upload-error"></div>
                </div>
                <div class="validation-section">
                    <div class="validation-header">
                        <label>
                            <input type="checkbox" id="validation-toggle" checked>
                            启用JSON验证
                        </label>
                        <button id="fix-btn" class="fix-btn" disabled>修复建议</button>
                    </div>
                    <div id="validation-result" class="validation-result"></div>
                </div>
            </div>
            <div class="output-section">
                <div class="output-header">
                    <div class="output-view-switcher">
                        <button id="json-view-btn" class="view-btn active">JSON</button>
                        <button id="xml-view-btn" class="view-btn">XML</button>
                    </div>
                    <button id="copy-btn" class="copy-btn" disabled>复制</button>
                </div>
                <div id="json-view" class="view-content">
                    <pre id="json-output"></pre>
                </div>
                <div id="xml-view" class="view-content" style="display: none;">
                    <pre id="xml-output"></pre>
                </div>
                <div id="copy-toast" class="copy-toast">已复制到剪贴板</div>
            </div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
